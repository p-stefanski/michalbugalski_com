{{ $folder := .Get "folder" }}
<link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/glightbox/dist/css/glightbox.min.css"
/>
<script src="https://cdn.jsdelivr.net/npm/glightbox/dist/js/glightbox.min.js"></script>

<style>
    .gallery-grid a {
        position: relative;
        display: block;
        overflow: hidden;
        border-radius: 0px;
    }

    .gallery-grid img {
        width: 100%;
        aspect-ratio: 4 / 3;
        object-fit: cover;
        object-position: center;
        display: block;
        border-radius: 0px;
    }

    .gallery-grid a.is-video::after {
        content: "▶";
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 64px;
        height: 64px;
        display: grid;
        place-items: center;
        border-radius: 999px;
        background: rgba(0, 0, 0, 0.6);
        color: white;
        font-size: 28px;
        line-height: 1;
        pointer-events: none;
    }
</style>

<div
    class="gallery-grid"
    style="
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
        gap: 1rem;
    "
>
    {{ .Inner }}
</div>

<script>
    GLightbox({ selector: ".glightbox" });
</script>
